# ============================================
# UrbanMove Cloud Native Smart Mobility Platform
# ============================================

# Server Configuration
spring.application.name=UrbanMove
server.port=8080
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging Configuration
logging.level.root=INFO
logging.level.com.urban.urban_move=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/urban_move.log
logging.file.max-size=10MB
logging.file.max-history=10

# Database Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/urban_move
#spring.datasource.username=root
#spring.datasource.password=Prakash@1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#
spring.datasource.url=jdbc:mysql://mysql.railway.internal:3306/railway
spring.datasource.username=root
spring.datasource.password=ypZIxHSYebtgUQkSvVylXvsKFxsVDCBh

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baselineOnMigrate=true

# JWT Configuration
app.jwt.secret=your-secret-key-that-must-be-long-enough-for-hs256-algorithm-minimum-32-bytes
app.jwt.expiration=86400000

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.prometheus.metrics.export.enabled=true

# Thymeleaf Configuration
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Error Handling - Disable white label error and use custom error page
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

# Static Resources
spring.web.resources.cache.period=31536000

# Jackson Configuration
# spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.default-property-inclusion=non_null

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Application Info
app.name=UrbanMove
app.description=Cloud Native Smart Mobility Management Platform
app.version=1.0.0
app.environment=development
