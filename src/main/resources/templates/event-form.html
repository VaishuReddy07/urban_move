<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Event Form - Urban Move</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> * { font-family: 'Inter', sans-serif; } body { background-color: #f9fafb; } </style>
</head>
<body>
        <div class="container mx-auto px-4 py-8">
            <div class="max-w-3xl mx-auto">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900">Log Mobility Event</h1>
                    <p class="text-gray-600 mt-2">Record a new event for real-time monitoring</p>
                </div>

                <!-- Form -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                    <form method="post" th:object="${event}" th:action="@{/events/add}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Event Type -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Event Type *</label>
                                <select th:field="*{eventType}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <option value="">Select event type</option>
                                    <option value="VEHICLE_START">Vehicle Start</option>
                                    <option value="VEHICLE_STOP">Vehicle Stop</option>
                                    <option value="SPEED_CHANGE">Speed Change</option>
                                    <option value="LOCATION_UPDATE">Location Update</option>
                                    <option value="TRAFFIC_CONGESTION">Traffic Congestion</option>
                                    <option value="ACCIDENT_DETECTED">Accident Detected</option>
                                    <option value="FUEL_LOW">Fuel Low</option>
                                    <option value="MAINTENANCE_ALERT">Maintenance Alert</option>
                                    <option value="SYSTEM_ERROR">System Error</option>
                                </select>
                            </div>

                            <!-- Severity -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Severity *</label>
                                <select th:field="*{severity}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                    <option value="INFO">Info</option>
                                    <option value="WARNING">Warning</option>
                                    <option value="CRITICAL">Critical</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Description *</label>
                                <textarea th:field="*{description}" placeholder="Enter event description" rows="4"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                            </div>

                            <!-- Latitude -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Latitude *</label>
                                <input type="number" th:field="*{latitude}" step="0.0001" placeholder="0.0000" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Longitude -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Longitude *</label>
                                <input type="number" th:field="*{longitude}" step="0.0001" placeholder="0.0000" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Speed -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Speed (km/h) *</label>
                                <input type="number" th:field="*{speed}" step="0.01" placeholder="0.0" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Event Timestamp -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Event Time *</label>
                                <input type="datetime-local" th:field="*{eventTimestamp}" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Metadata -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Additional Notes (JSON)</label>
                                <textarea th:field="*{metadata}" placeholder="Enter additional metadata as JSON" rows="3"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-4 mt-8 pt-8 border-t border-gray-200">
                            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg">
                                <i class="fas fa-save mr-2"></i>Log Event
                            </button>
                            <a href="/events" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 font-semibold py-3 px-6 rounded-lg text-center">
                                <i class="fas fa-times mr-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- End of event form content -->
</body>
</html>
</html>
