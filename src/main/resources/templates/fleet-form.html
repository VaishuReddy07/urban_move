<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fleet Form - Urban Move</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> * { font-family: 'Inter', sans-serif; } body { background-color: #f9fafb; } </style>
</head>
<body>
        <div class="container mx-auto px-4 py-8">
            <div class="max-w-2xl mx-auto">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900">
                        <span th:if="${fleet.id == null}">Create New Fleet</span>
                        <span th:if="${fleet.id != null}">Edit Fleet</span>
                    </h1>
                    <p class="text-gray-600 mt-2">Fill in the details to manage your fleet</p>
                </div>

                <!-- Form -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                    <form method="post" th:object="${fleet}" th:action="${fleet.id == null ? '/fleets/add' : '/fleets/edit/' + fleet.id}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <!-- Fleet Name -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Fleet Name *</label>
                                <input type="text" th:field="*{name}" placeholder="Enter fleet name" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Fleet Code -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Fleet Code *</label>
                                <input type="text" th:field="*{fleetCode}" placeholder="e.g., FL-001" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Base Location -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Base Location *</label>
                                <input type="text" th:field="*{baseLocation}" placeholder="Enter base location" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Latitude -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Base Latitude *</label>
                                <input type="number" th:field="*{baseLatitude}" step="0.0001" placeholder="0.0000" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Longitude -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Base Longitude *</label>
                                <input type="number" th:field="*{baseLongitude}" step="0.0001" placeholder="0.0000" 
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            </div>

                            <!-- Status -->
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
                                <select th:field="*{status}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="OPERATIONAL">Operational</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                    <option value="SUSPENDED">Suspended</option>
                                    <option value="INACTIVE">Inactive</option>
                                </select>
                            </div>

                            <!-- Description -->
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                                <textarea th:field="*{description}" placeholder="Enter fleet description" rows="4"
                                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-4 mt-8 pt-8 border-t border-gray-200">
                            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg">
                                <i class="fas fa-save mr-2"></i>
                                <span th:if="${fleet.id == null}">Create Fleet</span>
                                <span th:if="${fleet.id != null}">Update Fleet</span>
                            </button>
                            <a href="/fleets" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 font-semibold py-3 px-6 rounded-lg text-center">
                                <i class="fas fa-times mr-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- End of fleet form content -->
</body>
</html>
</html>
