<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Form - Urban Move</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> * { font-family: 'Inter', sans-serif; } body { background-color: #f9fafb; } </style>
</head>
<body>
        <div class="container mx-auto px-4 py-8">
            <div class="max-w-3xl mx-auto">
                <!-- Page Header -->
                <div class="mb-8">
                    <h1 class="text-3xl font-bold text-gray-900">
                        <span th:if="${vehicle.id == null}">Add New Vehicle</span>
                        <span th:if="${vehicle.id != null}">Edit Vehicle</span>
                    </h1>
                    <p class="text-gray-600 mt-2">Fill in the details to manage your vehicle</p>
                </div>

                <!-- Form -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
                    <form method="post" th:object="${vehicle}" th:action="${vehicle.id == null ? '/vehicles/add' : '/vehicles/edit/' + vehicle.id}">
                        <!-- Vehicle Identification Section -->
                        <div class="mb-8 pb-8 border-b border-gray-200">
                            <h2 class="text-xl font-bold text-gray-900 mb-6">Vehicle Identification</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Plate Number -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Plate Number *</label>
                                    <input type="text" th:field="*{plateNumber}" placeholder="e.g., ABC-1234" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                        required>
                                </div>

                                <!-- Vehicle Type -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Vehicle Type *</label>
                                    <select th:field="*{vehicleType}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                        <option value="">Select Type</option>
                                        <option value="Sedan">Sedan</option>
                                        <option value="SUV">SUV</option>
                                        <option value="Truck">Truck</option>
                                        <option value="Van">Van</option>
                                        <option value="Bus">Bus</option>
                                    </select>
                                </div>

                                <!-- Make -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Make *</label>
                                    <input type="text" th:field="*{make}" placeholder="e.g., Toyota" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                        required>
                                </div>

                                <!-- Model -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Model *</label>
                                    <input type="text" th:field="*{model}" placeholder="e.g., Camry" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                        required>
                                </div>

                                <!-- Year -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Year *</label>
                                    <input type="number" th:field="*{year}" min="1900" max="2100" placeholder="2024" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                        required>
                                </div>

                                <!-- Color -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Color</label>
                                    <input type="text" th:field="*{color}" placeholder="e.g., Silver" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                        </div>

                        <!-- Vehicle Details Section -->
                        <div class="mb-8 pb-8 border-b border-gray-200">
                            <h2 class="text-xl font-bold text-gray-900 mb-6">Vehicle Details</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <!-- Capacity -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Capacity (Passengers) *</label>
                                    <input type="number" th:field="*{capacity}" min="1" placeholder="4" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" 
                                        required>
                                </div>

                                <!-- Status -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Status *</label>
                                    <select th:field="*{status}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                        <option value="ACTIVE">Active</option>
                                        <option value="IDLE">Idle</option>
                                        <option value="MAINTENANCE">Maintenance</option>
                                        <option value="INACTIVE">Inactive</option>
                                    </select>
                                </div>

                                <!-- Fuel Type -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Fuel Type</label>
                                    <select th:field="*{fuelType}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="">Select Fuel Type</option>
                                        <option value="Petrol">Petrol</option>
                                        <option value="Diesel">Diesel</option>
                                        <option value="Electric">Electric</option>
                                        <option value="Hybrid">Hybrid</option>
                                        <option value="LPG">LPG</option>
                                    </select>
                                </div>

                                <!-- Mileage -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Current Mileage (km)</label>
                                    <input type="number" th:field="*{mileage}" min="0" step="10" placeholder="0" 
                                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>

                                <!-- Fleet -->
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Fleet</label>
                                    <select th:field="*{fleet}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="">Select Fleet</option>
                                        <option th:each="fleet : ${fleets}" th:value="${fleet.id}" th:text="${fleet.name}">Fleet A</option>
                                    </select>
                                </div>

                                <!-- Current Location -->
                                <div class="md:col-span-2">
                                    <h3 class="text-sm font-medium text-gray-900 mb-4">Current Location</h3>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-2">Latitude</label>
                                            <input type="number" th:field="*{currentLatitude}" step="0.0001" placeholder="0.0000" 
                                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        </div>
                                        <div>
                                            <label class="block text-xs font-medium text-gray-700 mb-2">Longitude</label>
                                            <input type="number" th:field="*{currentLongitude}" step="0.0001" placeholder="0.0000" 
                                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Buttons -->
                        <div class="flex gap-4 mt-8">
                            <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200">
                                <i class="fas fa-save mr-2"></i>
                                <span th:if="${vehicle.id == null}">Add Vehicle</span>
                                <span th:if="${vehicle.id != null}">Update Vehicle</span>
                            </button>
                            <a href="/vehicles" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-900 font-semibold py-3 px-6 rounded-lg text-center transition duration-200">
                                <i class="fas fa-times mr-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- End of vehicle form content -->
</body>
</html>
</html>
