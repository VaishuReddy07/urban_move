version: '3.8'

services:
  # MySQL Database Service
  mysql:
    image: mysql:8.0.35
    container_name: urban-move-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: urban_move
      MYSQL_USER: urban_user
      MYSQL_PASSWORD: urban_password
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - urban-move-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Spring Boot Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urban-move-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/urban_move
      SPRING_DATASOURCE_USERNAME: urban_user
      SPRING_DATASOURCE_PASSWORD: urban_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_URBAN_URBAN_MOVE: DEBUG
      APP_JWT_SECRET: your-super-secret-key-change-in-production
      APP_JWT_EXPIRATION: 86400000
      SERVER_PORT: 8080
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - urban-move-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    profiles:
      - backend

  # Redis Cache Service (Optional, for future use)
  redis:
    image: redis:7.2-alpine
    container_name: urban-move-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - urban-move-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - cache

  # Adminer for Database Management (Optional)
  adminer:
    image: adminer:latest
    container_name: urban-move-adminer
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - urban-move-network
    restart: unless-stopped
    profiles:
      - debug

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

networks:
  urban-move-network:
    driver: bridge

# Usage:
# Basic stack (MySQL + App):
#   docker-compose up -d
#
# With cache:
#   docker-compose --profile cache up -d
#
# With debug tools:
#   docker-compose --profile debug up -d
#
# Full stack:
#   docker-compose --profile backend --profile cache --profile debug up -d
#
# Stop all:
#   docker-compose down
#
# Remove volumes (reset database):
#   docker-compose down -v
#
# View logs:
#   docker-compose logs -f app
#   docker-compose logs -f mysql
